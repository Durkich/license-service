spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lowerCaseServiceId: true
      routes:
        - id: licensing-service
          uri: http://licensing-service:8081
          predicates:
            - Path=/static/**

server:
  port: 8072

eureka:
  instance:
    preferIpAddress: true
    hostname: license-gatewayserver
  client:
    registerWithEureka: true
    fetchRegistry: true
    service-url:
      defaultZone: http://license-eurekaserver:8070/eureka/